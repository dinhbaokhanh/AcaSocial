services:

  # ===== Infrastructure =====

  postgres:
    image: postgres:16-alpine
    container_name: acasocial-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: acasocial-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Services =====

  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    container_name: acasocial-identity
    restart: unless-stopped
    env_file:
      - ./services/identity-service/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===== Gateway =====

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: acasocial-gateway
    restart: unless-stopped
    env_file:
      - ./gateway/.env
    environment:
      REDIS_URL: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      IDENTITY_SERVICE_URL: http://identity-service:8081
    ports:
      - "8080:8080"
    networks:
      - internal
    depends_on:
      - identity-service

# ===== Volumes =====
volumes:
  postgres_data:
  redis_data:

# ===== Networks =====
networks:
  internal:
    driver: bridge
